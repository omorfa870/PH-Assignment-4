<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body class="body bg-[#F8FAFC] max-w-5xl mx-auto px-4">

  <!-- title and count section -->
  <section class="pt-16">
    <h1 class="text-3xl font-bold text-[#002C5C] pb-4">Job Application Tracker</h1>

    <div class="grid grid-cols-3 gap-4 pb-8">
      <div class="bg-white p-5 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.1)]">
        <h1 class="text-base font-semibold text-[#002C5C]">Total</h1>
        <p class="text-2xl font-bold text-gray-900">8</p>
      </div>

      <div class="bg-white p-5 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.1)]">
        <h1 class="text-base font-semibold text-[#002C5C]">Interview</h1>
        <p class="text-2xl font-bold text-green-400">0</p>
      </div>

      <div class="bg-white p-5 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.1)]">
        <h1 class="text-base font-semibold text-[#002C5C]">Rejected</h1>
        <p class="text-2xl font-bold text-[red]">0</p>
      </div>

    </div>

    <div class="border-b border-b-[#E6E7E9]"></div>

  </section>

  <!-- button section -->

  <section class="pt-8">
    <div class="flex justify-start mb-4">
      <button class="bg-[white] text-[#002C5C] px-4 py-2 rounded-lg hover:bg-[#3B82F6] transition duration-300 shadow-[0_0_10px_rgba(0,0,0,0.1)] min-w-25">All</button>
      <button class="ml-2 bg-[white] text-[#002C5C] px-4 py-2 rounded-lg hover:bg-[#3B82F6] transition duration-300 shadow-[0_0_10px_rgba(0,0,0,0.1)]">Interview</button>
      <button class="ml-2 bg-[white] text-[#002C5C] px-4 py-2 rounded-lg hover:bg-[#3B82F6] transition duration-300 shadow-[0_0_10px_rgba(0,0,0,0.1)]">Rejected</button>
    </div>

  </section>

  <!-- job application list section -->
   <section>
    <div class="bg-white p-5 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.1)] ">
    <div class="flex justify-between">
      <div>
        <h1 class="text-xl font-semibold text-[#002C5C]">Mobile First Corp</h1>
        <p class="text-[#64748B]">React Native Developer</p>
      </div>

      <div>
        <button class="w-9 h-9 rounded-full border border-[#E6E7E9] bg-white flex items-center justify-center text-[#002C5C] hover:text-red-500 shadow-[0_0_10px_rgba(0,0,0,0.1)]">
        <i class="fa-regular fa-trash-can text-sm"></i>
        </button>        
      </div>
    </div>
    </div>
   </section>



</body>

</html>
